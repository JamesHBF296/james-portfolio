name: deploy web
run-name: deploy web (${{ github.sha }})

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  web_build_test:
    name: Run web build test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: |
          mkdir -p dist
          cp james_hoh_portfolio.html dist/index.html

      - id: html_preview
        uses: pavi2410/html-preview-action@v5
        with:
          html_file: index.html
          site_root: dist
          job_summary: true


  build_and_push_docker_image:
    name: Build and push docker image
    needs: web_build_test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
          | docker login --username AWS --password-stdin \
          ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

      - name: Build image
        run: docker build -t portfolio .

      - name: Tag image
        run: |
          docker tag portfolio:latest \
          ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest

      - name: Push image
        run: |
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest


  deploy:
    name: Deploy to EC2 via SSM
    needs: build_and_push_docker_image
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        id: ssm_send
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ vars.AWS_REGION }} \
            --instance-ids ${{ secrets.AWS_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --query "Command.CommandId" \
            --output text \
            --parameters 'commands=[
              "aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com",
              "docker pull ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest",
              "docker stop web-nginx || true",
              "docker rm web-nginx || true",
              "docker run -d --name web-nginx -p 80:80 -p 443:443 \
                -v /etc/letsencrypt:/etc/letsencrypt:ro \
                -v /home/ec2-user/dockerfile/nginx-config/default.conf:/etc/nginx/conf.d/default.conf:ro \
                --restart always \
                ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest"
            ]')

          echo "COMMAND_ID=$COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT


      - name: Check SSM execution result
        run: |
          COMMAND_ID=${{ steps.ssm_send.outputs.command_id }}

          echo "Checking command: $COMMAND_ID"

          aws ssm get-command-invocation \
            --region ${{ vars.AWS_REGION }} \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.AWS_INSTANCE_ID }}