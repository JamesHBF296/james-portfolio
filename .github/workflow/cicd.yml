name: deploy web
run-name: deploy web (${{github.sha}})
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run web build test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          mkdir -p dist
          cp james_hoh_portfolio.html dist/index.html
      - id: html_preview
        uses: pavi2410/html-preview-action@v5
        with:
          html_file: index.html
          site_root: dist
          job_summary: true 
          
  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::229378727524:role/GitHub-James-Portfolio
          aws-region: ap-southeast-5

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-southeast-5 \
          | docker login --username AWS --password-stdin 229378727524.dkr.ecr.ap-southeast-5.amazonaws.com

      - name: Build image
        run: docker build -t portfolio .

      - name: Tag image
        run: |
          docker tag portfolio:latest \
          229378727524.dkr.ecr.ap-southeast-5.amazonaws.com/jameshoh/portfolio:latest

      - name: Push image
        run: |
          docker push 229378727524.dkr.ecr.ap-southeast-5.amazonaws.com/jameshoh/portfolio:latest
        
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::229378727524:role/GitHub-James-Portfolio
          aws-region: ap-southeast-5

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --region ap-southeast-5 \
            --instance-ids ${{ secrets.AWS_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws ecr get-login-password --region ap-southeast-5 | docker login --username AWS --password-stdin 229378727524.dkr.ecr.ap-southeast-5.amazonaws.com",
              "docker pull 229378727524.dkr.ecr.ap-southeast-5.amazonaws.com/jameshoh/portfolio:latest",
              "docker stop web-nginx || true",
              "docker rm web-nginx || true",
              "docker run -d --name web-nginx -p 80:80 -p 443:443 -v /etc/letsencrypt:/etc/letsencrypt:ro -v /home/ec2-user/dockerfile/nginx-config/default.conf:/etc/nginx/conf.d/default.conf:ro --restart always 229378727524.dkr.ecr.ap-southeast-5.amazonaws.com/jameshoh/portfolio:latest"
            ]'

  #docker run -d --name web-nginx   -p 80:80 -p 443:443   -v /etc/letsencrypt:/etc/letsencrypt:ro   -v /home/ec2-user/dockerfile/nginx-config/default.conf:/etc/nginx/conf.d/default.conf:ro   --restart always   web-nginx   